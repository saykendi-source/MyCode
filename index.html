<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyCode - TI UMY</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="top-panel">
      <div class="search">
        <span>Running text</span>
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="m16.5 16.5 4 4"></path>
        </svg>
      </div>

      <div class="hero">
        <div class="brand">
          <div class="logo-wrap">
            <img src="assets/logo-ti.png" alt="Logo TI UMY">
          </div>

          <div class="brand-text">
            <h1>MyCode</h1>
            <p>Decoding Your<br>Academic Journey</p>
          </div>
        </div>

        <div class="progress-line">
          <div class="progress"><div></div></div>
          <div class="clock-widget" aria-label="Jam WIB">
            <span class="clock-time" id="clock">00:00</span>
            <span class="clock-zone">WIB</span>
          </div>
        </div>
      </div>
    </section>

    <section class="bottom-panel">
      <div class="star">✦</div>
      <nav class="menu" aria-label="Menu utama">
        <a href="jadwal-dosen.html" aria-label="Buka halaman Jadwal Dosen">
          <div class="icon-card">📅</div>
          <div class="label">Jadwal<br>Dosen</div>
        </a>
        <a href="ruang-kuliah.html" aria-label="Buka halaman Ruang Kuliah">
          <div class="icon-card">🏠</div>
          <div class="label">Ruang<br>Kuliah</div>
        </a>
        <a href="agenda-prodi.html" aria-label="Buka halaman Agenda Prodi">
          <div class="icon-card">📋</div>
          <div class="label">Agenda<br>Prodi</div>
        </a>
        <a href="kkn.html" aria-label="Buka halaman KKN">
          <div class="icon-card">👥</div>
          <div class="label">KKN</div>
        </a>
        <a href="magang.html" aria-label="Buka halaman Magang">
          <div class="icon-card">🤖</div>
          <div class="label">Magang</div>
        </a>
        <a href="skripsi.html" aria-label="Buka halaman Skripsi">
          <div class="icon-card">📝</div>
          <div class="label">Skripsi</div>
        </a>
      </nav>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
